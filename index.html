<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourdough Business Suite</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border border-slate-100 text-center">
        <div class="w-24 h-24 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Sourdough Suite</h1>
        <p class="text-slate-500 mb-8">จัดการสูตรและการอบขนมปังอย่างมืออาชีพ</p>
        
        <!-- ปุ่มติดตั้งที่จะแสดงเมื่อระบบพร้อม -->
        <button id="installBtn" class="hidden w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
            ติดตั้งแอปบนหน้าจอ
        </button>

        <div id="pwaStatus" class="mt-4 text-xs text-slate-400">
            กำลังตรวจสอบระบบ PWA...
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('pwaStatus');
        const installBtn = document.getElementById('installBtn');

        // 1. ตรวจสอบการลงทะเบียน Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => { statusDiv.innerText = "ระบบ PWA พร้อมใช้งาน (Online)"; })
                .catch(err => { statusDiv.innerText = "SW Error: " + err; });
        }

        // 2. ดักจับเหตุการณ์ติดตั้ง
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden'); // แสดงปุ่มเมื่อเงื่อนไขครบ
            statusDiv.innerText = "พร้อมสำหรับการติดตั้งแล้ว";
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // ตรวจสอบว่าเป็น iOS หรือไม่ เพื่อให้คำแนะนำ
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS && !window.navigator.standalone) {
            statusDiv.innerText = "บน iOS: กดปุ่ม 'แชร์' และเลือก 'เพิ่มลงในหน้าจอโฮม'";
        }
    </script>
</body>
</html>
