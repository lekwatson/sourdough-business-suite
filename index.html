<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sourdough Business Suite</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ซ่อน Scrollbar สำหรับ Mobile */
        body::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- 1. หน้า Loading (แสดงตอนเปิดแอป) -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-indigo-600 rounded-3xl mb-6 flex items-center justify-center shadow-2xl animate-bounce">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Sourdough Suite</h1>
        <p id="status-text" class="text-slate-400 text-sm">กำลังเตรียมส่วนผสมของคุณ...</p>
    </div>

    <!-- 2. หน้า App Dashboard (แสดงเมื่อโหลดเสร็จ) -->
    <div id="main-app" class="hidden fade-in pb-20">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 flex justify-between items-center">
            <h2 class="font-bold text-lg text-indigo-600">Sourdough Suite</h2>
            <button id="install-mini-btn" class="hidden bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-full font-medium">ติดตั้งแอป</button>
        </header>

        <!-- Main Content -->
        <main class="p-4 space-y-4">
            <div class="bg-gradient-to-br from-indigo-600 to-violet-700 p-6 rounded-3xl text-white shadow-xl">
                <h3 class="text-lg font-semibold mb-1">ยินดีต้อนรับกลับมา!</h3>
                <p class="opacity-80 text-sm">วันนี้คุณจะอบอะไรดีครับ?</p>
            </div>

            <!-- เมนูจำลอง -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <div class="p-3 bg-amber-100 text-amber-600 rounded-xl mb-2">🍞</div>
                    <span class="text-sm font-semibold">สูตรขนมปัง</span>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <div class="p-3 bg-blue-100 text-blue-600 rounded-xl mb-2">⚖️</div>
                    <span class="text-sm font-semibold">เครื่องคำนวณ</span>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <div class="p-3 bg-green-100 text-green-600 rounded-xl mb-2">⏰</div>
                    <span class="text-sm font-semibold">ตั้งเวลาหมัก</span>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <div class="p-3 bg-purple-100 text-purple-600 rounded-xl mb-2">📈</div>
                    <span class="text-sm font-semibold">ประวัติการอบ</span>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h4 class="font-bold mb-3">คำแนะนำวันนี้</h4>
                <p class="text-sm text-slate-600 leading-relaxed">อุณหภูมิห้องวันนี้เหมาะสำหรับการเลี้ยง Starter เป็นอย่างมาก อย่าลืมให้อาหารน้องในช่วงบ่ายนะครับ</p>
            </div>
        </main>
    </div>

    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const mainApp = document.getElementById('main-app');
        const statusText = document.getElementById('status-text');
        const installBtn = document.getElementById('install-mini-btn');

        // ฟังก์ชันจำลองการโหลดข้อมูลแอป
        function showApp() {
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
            }, 1500); // แสดงหน้าโหลด 1.5 วินาทีเพื่อให้ดูเป็นแอปจริงๆ
        }

        // การลงทะเบียน Service Worker
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(reg => {
                    statusText.innerText = "ระบบพร้อมใช้งานแล้ว";
                    showApp();
                })
                .catch(err => {
                    console.error('SW Error:', err);
                    showApp(); // แม้ SW พังก็ยังให้เข้าแอปได้
                });
        } else {
            showApp();
        }

        // ระบบติดตั้ง
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
